version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AI_ENGINE_URL=http://ai_engine:8001
    depends_on:
      redis:
        condition: service_started
      ai_engine:
        condition: service_started
    networks:
      - saathi_network
    restart: unless-stopped

  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - saathi_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saathi_network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  saathi_network:
    driver: bridge
