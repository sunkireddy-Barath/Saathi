version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      # Connecting to Supabase Cloud DB (replace with actual URL in production)
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@supabase_host:6543/postgres?pgbouncer=true}
      - SYNC_DATABASE_URL=${SYNC_DATABASE_URL:-postgresql+psycopg2://postgres:postgres@supabase_host:6543/postgres?pgbouncer=true}
      - SECRET_KEY=your-super-secret-key-in-production
      - REDIS_URL=redis://redis:6379/0
      - REDIS_ENABLED=true
      - AI_ENGINE_URL=http://ai_engine:8001
    depends_on:
      redis:
        condition: service_started
      ai_engine:
        condition: service_started
    networks:
      - saathi_network
    restart: unless-stopped

  ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    networks:
      - saathi_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - saathi_network
    restart: unless-stopped

volumes:
  redis_data:

networks:
  saathi_network:
    driver: bridge
